name: Feature Request
description: Suggest a new feature or enhancement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Before submitting, check whether a [behavior pack](../../docs/behavior-packs.md) can already accomplish your goal — many customizations don't require a code change.

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What workflow problem does this feature solve?
      placeholder: "When I copy a URL, I want Iridium to also suggest my reference manager..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe what you'd like to happen.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Have you considered a behavior pack or any other workaround?

  - type: dropdown
    id: area
    attributes:
      label: Feature Area
      options:
        - Prediction Engine
        - Window Manager
        - Behavior Pack System
        - Menu Bar UI
        - Privacy / Security
        - Other
    validations:
      required: true

  - type: checkboxes
    id: pack-check
    attributes:
      label: Behavior Pack Check
      options:
        - label: I have confirmed this cannot be achieved with a behavior pack.
          required: false
